<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link id="preload-style" rel="stylesheet" href="preload.css" />
    <link
      rel="preload"
      as="style"
      onload="
        this.onload = null;
        this.rel = 'stylesheet';
        document.getElementById('preload-style').disabled = true;
      "
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <title>AluraDocs | Login</title>
  </head>

  <body class="col-lg-6 my-3 mx-auto">
    <header>
      <h1 class="text-center display-2 mb-4">AluraDocs</h1>
    </header>

    <main class="w-75 mx-auto">
      <hr />
      <h2 class="display-6 mb-3">Login</h2>

      <form id="form-login">
        <div class="mb-3">
          <label for="input-usuario" class="form-label">Usuário</label>
          <input
            type="text"
            class="form-control"
            name="input-usuario"
            id="input-usuario"
            required
          />
        </div>
        <div class="mb-3">
          <label for="input-senha" class="form-label">Senha</label>
          <input
            type="password"
            class="form-control"
            name="input-senha"
            id="input-senha"
            required
          />
        </div>
        <button type="submit" class="btn btn-primary mb-3">Login</button>
        <p>
          Não possui usuário?
          <a href="../cadastro/cadastro.html" class="link-primary">Faça o cadastro</a>
        </p>
      </form>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
      defer
    ></script>
    <script type="module" src="./login.ts" defer></script>
    <script src="/socket.io/socket.io.js" defer></script>
  </body>
</html>
