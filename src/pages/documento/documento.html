<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link id="preload-style" rel="stylesheet" href="documento.css" />
    <link
      rel="preload"
      as="style"
      onload="
        this.onload = null;
        this.rel = 'stylesheet';
        document.getElementById('preload-style').disabled = true;
      "
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <title>Documento</title>
  </head>

  <body class="mt-3">
    <header>
      <h1 class="display-4 mb-4 text-center" id="titulo-documento">...</h1>
    </header>

    <main class="w-75 mx-auto">
      <textarea
        id="editor-texto"
        class="form-control mb-4"
        style="height: 400px; resize: none"
        disabled
      ></textarea>

      <div class="barra-botoes d-flex justify-content-between">
        <a href="/" class="btn btn-primary">Voltar</a>
        <button id="excluir-documento" class="btn btn-outline-danger" disabled>
          Excluir documento
        </button>
      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
      defer
    ></script>
    <script src="./documento.ts" type="module" defer></script>
  </body>
</html>
