<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link id="preload-style" rel="stylesheet" href="/src/preload.css" />
    <link
      rel="preload"
      as="style"
      onload="
        this.onload = null;
        this.rel = 'stylesheet';
        document.getElementById('preload-style').disabled = true;
      "
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <title>Alura Docs</title>
  </head>

  <body class="col-lg-6 mt-3 mx-auto">
    <header>
      <h1 class="text-center display-2 mb-4">AluraDocs</h1>
    </header>

    <main class="w-75 mx-auto">
      <div
        id="lista-documentos-vazia"
        class="d-flex flex-column align-items-center justify-content-center gap-3"
      >
        <div id="spinner" class="spinner-border text-primary mt-3" role="status"></div>
        <p id="texto-lista-documentos-vazia" class="mt-3">Inicializando...</p>
      </div>

      <div id="lista-documentos" class="list-group mb-4"></div>

      <form id="form-adiciona-documento" class="row g-3" hidden>
        <div class="col-md-6">
          <label class="visually-hidden" for="input-documento">Nome do documento</label>
          <input
            type="text"
            class="form-control"
            id="input-documento"
            placeholder="Documento..."
            required
          />
        </div>

        <div class="col-md-6">
          <button type="submit" class="btn btn-primary w-100">Adicionar documento</button>
        </div>
      </form>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
      defer
    ></script>
    <script type="module" src="src/main.ts" defer></script>
  </body>
</html>
